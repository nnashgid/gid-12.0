            <div id="place-map" class="map-frame"></div>
          </div>
          <div class="info-panel" style="margin-top:24px;">
            <h3>Похожие места</h3>
            <ul id="place-similar"></ul>
          </div>
          <button class="btn btn-primary" style="width:100%; margin-top:24px;">Добавить в маршрут</button>
